<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Abrasito de Andres</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 800px at 50% 25%, #1f2937, #0b1220);
      }
      .wrap {
        width: min(720px, 92vw);
        display: grid;
        gap: 18px;
        justify-items: center;
      }
      button {
        width: min(560px, 92vw);
        min-height: 120px;
        padding: 18px 22px;
        font-size: clamp(20px, 4.2vw, 34px);
        font-weight: 800;
        border: 0;
        border-radius: 24px;
        cursor: pointer;
        background: linear-gradient(135deg, #f59e0b, #f97316);
        color: #111827;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        transition: transform 120ms ease, filter 120ms ease;
      }
      button:active {
        transform: translateY(1px) scale(0.99);
        filter: brightness(0.98);
      }
      img {
        display: none;
        width: min(560px, 92vw);
        height: auto;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }
      .hint {
        opacity: 0.85;
        text-align: center;
        font-size: 14px;
        max-width: 60ch;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <button id="btn">Abrasito de Andres ⭐</button>
      <img id="flork" src="./flork.png" alt="Flork" />
      <div class="hint">Al pulsar el botón aparece la imagen <code>flork.png</code>.</div>
    </div>

    <script>
      const btn = document.getElementById("btn");
      const img = document.getElementById("flork");

      btn.addEventListener("click", () => {
        img.style.display = "block";
        img.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    </script>
  </body>
</html>
